<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>리딤 도우미 설정</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f5f7fb; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #335eea; margin-bottom: 20px; font-size: 24px; }

        /* 입력 영역 */
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; background: #f0f3ff; padding: 15px; border-radius: 8px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; flex: 1; }
        .btn-add { background: #335eea; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #2847b7; }

        /* 리스트 영역 */
        .item-list { list-style: none; padding: 0; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        .game-name { font-weight: bold; color: #333; }
        .game-url { font-size: 12px; color: #666; word-break: break-all; }
        .btn-delete { background: #ff4d4f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-delete:hover { background: #d32f2f; }
        .enable-check {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .game-name {
            transition: color 0.3s ease;
        }

        #guide { font-size: 13px; color: #888; margin-top: 5px; }
        .footer-area {
            display: flex;
            justify-content: flex-end; /* 우측 정렬 */
            margin-top: 20px;         /* 위쪽 간격 조절 */
        }
    </style>
</head>
<body>
<div class="container">
    <h1 id="header">리딤코드 자동 입력 설정</h1>

    <div class="input-group">
        <input type="text" id="nameInput" placeholder="게임 이름 (예: 원신)">
        <input type="text" id="urlInput" placeholder="URL 형식 ({n} 포함)">
        <button class="btn-add" id="addBtn">추가</button>
    </div>
    <p id="guide">* URL에서 코드가 들어갈 자리에 <b>{n}</b>을 적어주세요.</p>
    <div style="text-align: right; margin-bottom: 10px;">
        <button id="resetBtn" class="btn-delete" style="padding: 8px 15px;">기본값으로 초기화</button>
    </div>
    <hr>

    <ul id="itemList" class="item-list">
    </ul>
    <hr>
    <div class="footer-area">
        <a target="_blank" href="https://www.buymeacoffee.com/WriterPark">
            <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=WriterPark&button_colour=161616&font_colour=ffffff&font_family=Inter&outline_colour=ffffff&coffee_colour=FFDD00" />
        </a>
    </div>
</div>

<script type="module" src="options.js"></script>
</body>
</html>
