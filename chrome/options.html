<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>리딤 도우미 설정</title>
    <link href="options.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 id="header">리딤코드 자동 입력 설정</h1>

    <div class="input-group">
        <input type="text" id="nameInput" placeholder="게임 이름 (예: 원신)">
        <input type="text" id="urlInput" placeholder="URL 형식 ({n} 포함)">
        <button class="btn-add" id="addBtn">추가</button>
    </div>
    <p id="guide">* URL에서 코드가 들어갈 자리에 <b>{n}</b>을 적어주세요.</p>
    <div style="text-align: right; margin-bottom: 10px;">
        <button id="resetBtn" class="btn-delete" style="padding: 8px 15px;">기본값으로 초기화</button>
    </div>
    <hr>

    <ul id="itemList" class="item-list">
    </ul>
    <hr>
    <div class="footer-area">
        <a target="_blank" href="https://www.buymeacoffee.com/WriterPark">
            <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=WriterPark&button_colour=161616&font_colour=ffffff&font_family=Inter&outline_colour=ffffff&coffee_colour=FFDD00" />
        </a>
    </div>
</div>

<script type="module" src="options.js"></script>
</body>
</html>
